name: Terraform

# Manual lifecycle control for the AWS stack.
# - "plan"    : show what apply would do (safe, read-only).
# - "apply"   : provision / update infra.
# - "destroy" : tear it all down. Requires typing "destroy" in `confirm` to run.

on:
  workflow_dispatch:
    inputs:
      action:
        description: "What to run"
        required: true
        type: choice
        default: plan
        options: [plan, apply, destroy]
      confirm:
        description: 'Type "destroy" to enable a destroy run (ignored for plan/apply)'
        required: false
        default: ""

concurrency:
  group: terraform
  cancel-in-progress: false

# Required for OIDC: lets the workflow request a JWT from GitHub.
permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "0"
      TF_VAR_aws_region:        ${{ vars.AWS_REGION }}
      TF_VAR_cors_allow_origin: ${{ vars.CORS_ALLOW_ORIGIN || '*' }}
    steps:
      - name: Guard destroy
        if: github.event.inputs.action == 'destroy' && github.event.inputs.confirm != 'destroy'
        run: |
          echo "::error::Destroy requires confirm='destroy'. Aborting."
          exit 1

      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region:     ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      # Write secrets to a tfvars.json file. Same file is used by plan AND
      # apply, so Terraform sees identical inputs and won't complain. The
      # file is auto-loaded thanks to the .auto.tfvars.json suffix, and is
      # cleaned up at the end of the job (runner is ephemeral anyway).
      - name: Materialize secret_env_vars tfvars
        env:
          OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          for v in OPENAI_API_KEY ANTHROPIC_API_KEY GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET GOOGLE_REFRESH_TOKEN; do
            echo "::add-mask::${!v}"
          done
          jq -n \
            --arg openai    "$OPENAI_API_KEY" \
            --arg anthropic "$ANTHROPIC_API_KEY" \
            --arg gid       "$GOOGLE_CLIENT_ID" \
            --arg gsec      "$GOOGLE_CLIENT_SECRET" \
            --arg grt       "$GOOGLE_REFRESH_TOKEN" \
            '{secret_env_vars: {
                OPENAI_API_KEY: $openai,
                ANTHROPIC_API_KEY: $anthropic,
                GOOGLE_CLIENT_ID: $gid,
                GOOGLE_CLIENT_SECRET: $gsec,
                GOOGLE_REFRESH_TOKEN: $grt
              }}' > secrets.auto.tfvars.json
          # Don't echo the file contents.
          echo "Wrote $(wc -c < secrets.auto.tfvars.json) bytes to secrets.auto.tfvars.json"

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ vars.AWS_REGION }}"

      - name: Terraform plan
        if: github.event.inputs.action == 'plan'
        run: terraform plan -no-color

      # First apply creates ECR (and everything that doesn't depend on the
      # image existing). On a fresh account the Lambda CANNOT be created
      # before an image is pushed, so we provision in two phases.
      - name: Terraform apply (ECR first)
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve -no-color -target=aws_ecr_repository.api

      # Push a placeholder image so Lambda has something to point at. The
      # Deploy workflow overwrites :latest with the real app image right
      # after. Idempotent: subsequent runs just overwrite :latest with the
      # same upstream layers, which Lambda's `ignore_changes` masks.
      - name: Seed ECR with placeholder image
        if: github.event.inputs.action == 'apply'
        run: |
          ECR_URL=$(terraform output -raw ecr_repo)
          REGISTRY="${ECR_URL%%/*}"
          aws ecr get-login-password --region "${{ vars.AWS_REGION }}" | \
            docker login --username AWS --password-stdin "$REGISTRY"
          docker pull --platform linux/amd64 public.ecr.aws/lambda/python:3.12
          docker tag public.ecr.aws/lambda/python:3.12 "$ECR_URL:latest"
          docker push "$ECR_URL:latest"

      - name: Terraform apply (full stack)
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve -no-color

      - name: Terraform destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve -no-color

      - name: Show outputs
        if: github.event.inputs.action == 'apply'
        run: terraform output

      - name: Clean up secrets file
        if: always()
        run: rm -f secrets.auto.tfvars.json
